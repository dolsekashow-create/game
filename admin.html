  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-mid: #15131c;
      --bg-light: #1f1c2a;
      --gold: #c9a961;
      --gold-bright: #e8c876;
      --gold-dim: #8a7544;
      --crimson: #8b1a1a;
      --crimson-bright: #c43434;
      --green: #5ec88f;
      --frame-unit: #c9a961;
      --frame-spell: #6b8cff;
      --frame-trap: #c43434;
      --text-soft: #d8d2c4;
      --text-dim: #8a8275;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-deep);
      color: var(--text-soft);
      font-family: 'Cormorant Garamond', 'Amiri', serif;
      min-height: 100vh;
    }
    body {
      background:
        radial-gradient(ellipse at top, #1a1530 0%, transparent 60%),
        radial-gradient(ellipse at bottom, #1a1020 0%, transparent 60%),
        var(--bg-deep);
      background-attachment: fixed;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 9999;
    }
    .font-display { font-family: 'Cinzel', serif; letter-spacing: 0.04em; }
    .font-body { font-family: 'Cormorant Garamond', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* Buttons */
    .btn {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.55rem 1.1rem;
      border: 1.5px solid var(--gold);
      background: linear-gradient(135deg, rgba(201,169,97,0.15) 0%, rgba(201,169,97,0.05) 100%);
      color: var(--gold-bright);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      font-size: 0.78rem;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      background: linear-gradient(135deg, rgba(201,169,97,0.3) 0%, rgba(201,169,97,0.15) 100%);
      box-shadow: 0 0 16px rgba(201,169,97,0.4);
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-crimson {
      border-color: var(--crimson-bright);
      color: var(--crimson-bright);
      background: linear-gradient(135deg, rgba(196,52,52,0.15) 0%, rgba(196,52,52,0.05) 100%);
    }
    .btn-crimson:hover {
      background: linear-gradient(135deg, rgba(196,52,52,0.3) 0%, rgba(196,52,52,0.15) 100%);
      box-shadow: 0 0 16px rgba(196,52,52,0.4);
    }
    .btn-green {
      border-color: var(--green);
      color: var(--green);
      background: linear-gradient(135deg, rgba(94,200,143,0.15) 0%, rgba(94,200,143,0.05) 100%);
    }
    .btn-green:hover {
      background: linear-gradient(135deg, rgba(94,200,143,0.3) 0%, rgba(94,200,143,0.15) 100%);
      box-shadow: 0 0 16px rgba(94,200,143,0.4);
    }

    /* Card thumbnail (in list) */
    .card-thumb {
      width: 100%;
      aspect-ratio: 0.7;
      background: linear-gradient(165deg, #1a1622 0%, #100c18 100%);
      border-radius: 6px;
      padding: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }
    .card-thumb.unit { border: 2px solid var(--frame-unit); }
    .card-thumb.spell { border: 2px solid var(--frame-spell); }
    .card-thumb.trap { border: 2px solid var(--frame-trap); }
    .card-thumb:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(201,169,97,0.3);
    }
    .card-thumb.selected {

      border-radius: 6px;
      padding: 1.2rem;

      align-items: center;
      justify-content: center;

      letter-spacing: 0.05em;

    .save-pill.saving { background: rgba(232,200,118,0.15); color: var(--gold-bright); border: 1px solid var(--gold); }
    .save-pill.error { background: rgba(196,52,52,0.15); color: var(--crimson-bright); border: 1px solid var(--crimson-bright); }

    .tab {
      padding: 0.5rem 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .tab:hover { color: var(--gold); }
    .tab.active {

      border-bottom-color: var(--gold-bright);

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-mid); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }

    /* Modal */
    .modal-backdrop {

      inset: 0;
      background: rgba(5, 5, 12, 0.85);
      backdrop-filter: blur(6px);
      display: flex;

    .modal {

      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
  </style>

    // ════════════════════════════════════════════════════════════
    // SUPABASE HELPERS
    // ════════════════════════════════════════════════════════════
    async function fetchAllCards() {
      const { data, error } = await sb.from('cards').select('*').order('id');
      if (error) throw error;
      return data || [];
    }

    async function upsertCard(card) {
      const payload = {
        id: card.id,
        name_en: card.name_en,
        name_ar: card.name_ar,
        type: card.type,
        cost: Number(card.cost),
        movement: card.movement || null,
        atk: card.atk !== null && card.atk !== '' ? Number(card.atk) : null,
        hp: card.hp !== null && card.hp !== '' ? Number(card.hp) : null,
        desc_ar: card.desc_ar,
        icon: card.icon || null,
        image_url: card.image_url || null,
        ability: card.ability || null,
        target: card.target || null,
        effect: card.effect || null,
        damage: card.damage !== null && card.damage !== '' ? Number(card.damage) : null
      };
      const { error } = await sb.from('cards').upsert(payload);
      if (error) throw error;
    }

    async function uploadImage(file, cardId) {
      const ext = (file.name.split('.').pop() || 'png').toLowerCase();
      const filename = `${cardId}-${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage
        .from(STORAGE_BUCKET)
        .upload(filename, file, { upsert: true, cacheControl: '3600' });
      if (upErr) throw upErr;
      const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(filename);
      return urlData.publicUrl;
    }

    async function fetchSettings() {
      const { data, error } = await sb.from('settings').select('*').eq('id', 1).maybeSingle();
      if (error) throw error;
      return data || { id: 1, card_back_url: null };
    }

    async function saveSettings(settings) {
      const { error } = await sb.from('settings').upsert({
        id: 1,
        card_back_url: settings.card_back_url || null
      });
      if (error) throw error;
    }

    async function seedDefaults() {
      for (const card of DEFAULT_CARDS) {
        await upsertCard(card);
      }
    }

    // ════════════════════════════════════════════════════════════
    // مكوّن: رفع الصورة (drag/drop + click)
    // ════════════════════════════════════════════════════════════
    function ImageUploader({ currentUrl, onUpload, onClear, label = 'الصورة' }) {
      const fileRef = useRef(null);
      const [uploading, setUploading] = useState(false);
      const [error, setError] = useState(null);

      async function handleFile(file) {
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          setError('لطفاً اختر ملف صورة فقط.');
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          setError('الصورة كبيرة جداً (الحد 5MB).');
          return;
        }
        setError(null);
        setUploading(true);
        try {
          await onUpload(file);
        } catch (e) {
          setError('فشل رفع الصورة: ' + (e.message || e));
        } finally {
          setUploading(false);
        }
      }

      function onDrop(e) {
        e.preventDefault();
        const file = e.dataTransfer.files?.[0];
        if (file) handleFile(file);
      }

      return (
        <div>
          <div
            className={`img-drop ${currentUrl ? 'has-image' : ''}`}
            onClick={() => !uploading && fileRef.current?.click()}
            onDragOver={(e) => e.preventDefault()}
            onDrop={onDrop}
          >
            {uploading ? (
              <>
                <div className="font-display text-yellow-400 text-2xl">⚜</div>
                <div className="font-body text-gray-300">جاري الرفع...</div>
              </>
            ) : currentUrl ? (
              <img src={currentUrl} alt="preview" />
            ) : (
              <>
                <div className="text-4xl">🖼️</div>
                <div className="font-body text-gray-400">اسحب الصورة هنا أو اضغط للاختيار</div>
                <div className="text-xs text-gray-600">PNG, JPG, WEBP — حتى 5MB</div>
              </>
            )}
            <input
              ref={fileRef}
              type="file"
              accept="image/*"
              hidden
              onChange={(e) => handleFile(e.target.files?.[0])}
            />
          </div>
          {error && <div className="text-red-400 text-sm mt-2 font-body">{error}</div>}
          {currentUrl && (
            <div className="mt-2 flex justify-end">
              <button
                className="btn btn-crimson"
                style={{ padding: '0.3rem 0.7rem', fontSize: '0.7rem' }}
                onClick={(e) => { e.stopPropagation(); onClear(); }}
              >
                إزالة الصورة
              </button>
            </div>
          )}
        </div>
      );
    }

    // التطبيق الرئيسي
    // ════════════════════════════════════════════════════════════
    function AppWithAuthGate() {
      const [authState, setAuthState] = useState('checking'); // checking | not_logged_in | not_admin | admin
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);

      useEffect(() => {
        let alive = true;

        async function checkAuth() {
          try {
            const { data: { session } } = await sb.auth.getSession();
            if (!alive) return;
            if (!session?.user) {
              setAuthState('not_logged_in');
              return;
            }
            setUser(session.user);
            const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
            if (!alive) return;
            setProfile(p);
            if (p?.is_admin) {
              setAuthState('admin');
            } else {
              setAuthState('not_admin');
            }
          } catch (e) {
            console.error('Auth check failed:', e);
            setAuthState('not_logged_in');
          }
        }

        checkAuth();

        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          if (!alive) return;
          if (event === 'SIGNED_OUT') {
            setUser(null);
            setProfile(null);
            setAuthState('not_logged_in');
          } else if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
            checkAuth();
          }
        });

        return () => { alive = false; subscription?.unsubscribe(); };
      }, []);

      async function handleSignIn() {
        try {
          const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname }
          });
          if (error) {
            if (error.message?.includes('provider is not enabled') || error.message?.includes('Unsupported provider')) {
              alert('Google OAuth غير مفعّل في Supabase.\n\nاتبع الخطوات في README.md قسم "المرحلة 1":\n1) فعّل Google Provider في Supabase Dashboard\n2) ضيف Client ID و Secret من Google Cloud Console');
            } else {
              alert('فشل تسجيل الدخول: ' + error.message);
            }
          }
        } catch (e) {
          alert('خطأ غير متوقع. راجع console للتفاصيل.');
          console.error(e);
        }
      }

      async function handleSignOut() {
        await sb.auth.signOut();
        window.location.href = 'index.html';
      }

      if (authState === 'checking') {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="font-display text-3xl text-yellow-400 mb-4">⚜</div>
              <div className="font-display text-xl text-yellow-300">جاري التحقق من الجلسة...</div>
            </div>
          </div>
        );
      }

      if (authState === 'not_logged_in') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="modal text-center">
              <div className="text-5xl mb-4">🔒</div>
              <h1 className="font-display text-2xl text-yellow-400 mb-3">دخول الأدمن مطلوب</h1>
              <p className="font-body text-gray-300 mb-6">
                لوحة التحكم محمية. سجّل دخول بحساب Google المعتمد كأدمن.
              </p>
              <button className="btn mb-3" onClick={handleSignIn}>🔑 دخول بـ Google</button>
              <div><a href="index.html" className="text-sm text-gray-500 underline">العودة للعبة</a></div>
            </div>
          </div>
        );
      }

      if (authState === 'not_admin') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="modal text-center">
              <div className="text-5xl mb-4">⛔</div>
              <h1 className="font-display text-2xl text-red-400 mb-3">غير مصرح</h1>
              <p className="font-body text-gray-300 mb-2">
                حسابك ({profile?.email || user?.email}) ليس لديه صلاحية أدمن.
              </p>
              <p className="font-body text-sm text-gray-500 mb-6">
                لو إنت صاحب المشروع، شغّل هذا الأمر في Supabase SQL Editor:
                <code className="block mt-2 p-2 bg-black/40 rounded text-xs text-yellow-300 text-left direction-ltr" style={{ direction: 'ltr' }}>
                  update public.profiles<br/>
                  set is_admin = true<br/>
                  where email = '{profile?.email || user?.email}';
                </code>
              </p>
              <div className="flex gap-3 justify-center">
                <button className="btn btn-crimson" onClick={handleSignOut}>تسجيل خروج</button>
                <a href="index.html" className="btn">العودة للعبة</a>
              </div>
            </div>
          </div>
        );
      }

      return <AdminApp user={user} profile={profile} onSignOut={handleSignOut} />;
    }

    // ════════════════════════════════════════════════════════════
    // AddCoinsPanel — شحن لاعب بـ Player ID
    // ════════════════════════════════════════════════════════════
    function AddCoinsPanel() {
      const [playerId, setPlayerId] = useState('#');
      const [amount, setAmount] = useState('');
      const [busy, setBusy] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const quickAmounts = [500, 1000, 2500, 5000, 7500];

      // تحميل آخر 10 عمليات
      const loadHistory = useCallback(async () => {
        const { data, error: err } = await sb
          .from('admin_coin_log')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(10);
        if (!err && data) setHistory(data);
      }, []);

      useEffect(() => { loadHistory(); }, [loadHistory]);

      async function handleSubmit() {
        setError(null);
        setResult(null);

        const cleanedId = playerId.trim().toUpperCase();
        const amt = parseInt(amount, 10);

        if (!cleanedId || cleanedId === '#') {
          setError('اكتب Player ID');
          return;
        }
        if (isNaN(amt) || amt === 0) {
          setError('اكتب مبلغ صحيح');
          return;
        }

        setBusy(true);
        const { data, error: rpcError } = await sb.rpc('admin_add_coins', {
          target_player_id: cleanedId,
          amount: amt,
        });
        setBusy(false);

        if (rpcError) {
          setError(rpcError.message || 'حصل خطأ');
          return;
        }
        if (data?.success) {
          setResult(data);
          setPlayerId('#');
          setAmount('');
          loadHistory(); // أعد تحميل السجل
        } else {
          setError('حصل خطأ غير متوقع');
        }
      }

      return (
        <div className="bg-black/40 border border-yellow-900/40 rounded-lg p-4 md:p-6 mb-6">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h2 className="font-display text-xl text-yellow-400">💰 شحن لاعب بالعملات</h2>
            <button
              onClick={() => setShowHistory(s => !s)}
              className="text-xs px-3 py-1 rounded border"
              style={{ borderColor: '#5a4a2a', color: '#c9a961', background: 'rgba(0,0,0,0.3)' }}
            >
              {showHistory ? 'إخفاء السجل' : `📋 السجل (${history.length})`}
            </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            {/* Player ID */}
            <div>
              <label className="block text-xs text-gray-400 mb-1">معرّف اللاعب (Player ID)</label>
              <input
                type="text"
                value={playerId}
                onChange={e => {
                  let v = e.target.value.toUpperCase();
                  if (v && !v.startsWith('#')) v = '#' + v.replace(/^#+/, '');
                  setPlayerId(v);
                }}
                placeholder="#ABC123"
                className="w-full px-3 py-2 rounded font-mono text-yellow-300"
                style={{
                  background: 'rgba(0,0,0,0.4)',
                  border: '1px solid #5a4a2a',
                  letterSpacing: '0.1em',
                  fontSize: '1.1rem',
                }}
                disabled={busy}
              />
            </div>

            {/* المبلغ */}
            <div>
              <label className="block text-xs text-gray-400 mb-1">المبلغ <span className="text-gray-500">(يمكن سالب للخصم)</span></label>
              <input
                type="number"
                value={amount}
                onChange={e => setAmount(e.target.value)}
                placeholder="1000"
                className="w-full px-3 py-2 rounded font-mono text-yellow-300"
                style={{
                  background: 'rgba(0,0,0,0.4)',
                  border: '1px solid #5a4a2a',
                  fontSize: '1.1rem',
                }}
                disabled={busy}
              />
            </div>
          </div>

          {/* أزرار سريعة */}
          <div className="flex gap-2 flex-wrap mb-4">
            <span className="text-xs text-gray-500 self-center">سريع:</span>
            {quickAmounts.map(a => (
              <button
                key={a}
                type="button"
                onClick={() => setAmount(String(a))}
                disabled={busy}
                style={{
                  padding: '0.3rem 0.7rem',
                  fontSize: '0.8rem',
                  background: 'rgba(201,169,97,0.1)',
                  border: '1px solid #5a4a2a',
                  borderRadius: '4px',
                  color: '#c9a961',
                  cursor: 'pointer',
                  fontFamily: 'monospace',
                }}
              >
                +{a.toLocaleString('en-US')}
              </button>
            ))}
          </div>

          {/* الزر الأساسي */}
          <button
            className="btn w-full md:w-auto"
            onClick={handleSubmit}
            disabled={busy}
            style={{
              background: 'linear-gradient(180deg, #c9a961, #8a7340)',
              color: '#1a1024',
              fontWeight: 'bold',
              padding: '0.6rem 1.5rem',
            }}
          >
            {busy ? '⏳ جاري التنفيذ...' : '✓ تأكيد الشحن'}
          </button>

          {/* رسالة خطأ */}
          {error && (
            <div className="mt-4 p-3 rounded text-sm" style={{
              background: 'rgba(180,40,40,0.15)',
              border: '1px solid #7a2020',
              color: '#ff9090',
            }}>
              ⚠ {error}
            </div>
          )}

          {/* رسالة نجاح */}
          {result && (
            <div className="mt-4 p-4 rounded" style={{
              background: 'rgba(40,140,80,0.15)',
              border: '1px solid #2a6a4a',
              color: '#9eeac0',
            }}>
              <div className="font-display text-lg mb-2">✓ تمت العملية بنجاح</div>
              <div className="text-sm space-y-1">
                <div>
                  <b className="text-yellow-300">{result.display_name}</b>
                  <span className="text-gray-400 mx-2">•</span>
                  <span className="font-mono">{result.player_id}</span>
                </div>
                <div>
                  المبلغ المُحوّل: <b>{result.amount_added >= 0 ? '+' : ''}{result.amount_added.toLocaleString('en-US')}</b>
                </div>
                <div className="text-xs" style={{ color: '#7ac09a' }}>
                  الرصيد: {result.old_balance.toLocaleString('en-US')} → <b>{result.new_balance.toLocaleString('en-US')}</b>
                </div>
              </div>
            </div>
          )}

          {/* سجل العمليات */}
          {showHistory && (
            <div className="mt-4 pt-4 border-t border-yellow-900/30">
              <h3 className="font-display text-sm text-yellow-300 mb-2">📋 آخر 10 عمليات</h3>
              {history.length === 0 ? (
                <div className="text-sm text-gray-500 text-center py-3">مفيش عمليات بعد</div>
              ) : (
                <div className="space-y-1">
                  {history.map(h => (
                    <div key={h.id} className="text-xs flex flex-wrap items-center gap-2 p-2 rounded" style={{ background: 'rgba(0,0,0,0.3)' }}>
                      <span className="font-mono text-yellow-300">{h.target_player_id}</span>
                      <span style={{ color: h.amount > 0 ? '#7ac09a' : '#ff9090', fontWeight: 'bold' }}>
                        {h.amount > 0 ? '+' : ''}{h.amount.toLocaleString('en-US')}
                      </span>
                      <span className="text-gray-500">
                        ({h.old_balance.toLocaleString('en-US')} → {h.new_balance.toLocaleString('en-US')})
                      </span>
                      <span className="text-gray-600 ml-auto">{new Date(h.created_at).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' })}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function AdminApp({ user, profile, onSignOut }) {
      const [loadState, setLoadState] = useState('loading'); // loading|ready|error
      const [errorMsg, setErrorMsg] = useState('');
      const [cards, setCards] = useState([]);
      const [settings, setSettings] = useState({ id: 1, card_back_url: null });
      const [selectedId, setSelectedId] = useState(null);
      const [saveStatus, setSaveStatus] = useState({}); // {cardId: 'saving'|'saved'|'error'}
      const [globalMsg, setGlobalMsg] = useState(null);

      // تحميل البيانات
      const reload = useCallback(async () => {
        setLoadState('loading');
        try {
          const [cardsData, settingsData] = await Promise.all([
            fetchAllCards(),
            fetchSettings()
          ]);
          // لو DB فارغ، نعرض الافتراضيات ولكن ما نخزنش
          if (cardsData.length === 0) {
            setCards(DEFAULT_CARDS.map(c => ({ ...c })));
          } else {
            // دمج: نتأكد من ظهور كل الكروت حتى لو ناقصة من DB
            const merged = DEFAULT_CARDS.map(def => {
              const db = cardsData.find(c => c.id === def.id);
              return db ? { ...def, ...db } : { ...def };
            });
            // كروت إضافية (لو فيه)
            const extras = cardsData.filter(c => !DEFAULT_CARDS.find(d => d.id === c.id));
            setCards([...merged, ...extras]);
          }
          setSettings(settingsData);
          setLoadState('ready');
          if (!selectedId && cardsData.length > 0) {
            setSelectedId(cardsData[0].id);
          } else if (!selectedId) {
            setSelectedId(DEFAULT_CARDS[0].id);
          }
        } catch (e) {
          setErrorMsg(e.message || String(e));
          setLoadState('error');
        }
      }, [selectedId]);

      useEffect(() => { reload(); }, []);

      // تحديث كارت محلياً (بدون حفظ)
      function updateCard(updated) {
        setCards(prev => prev.map(c => c.id === updated.id ? updated : c));
      }

      // حفظ كارت في Supabase
      async function saveCard(card) {
        setSaveStatus(s => ({ ...s, [card.id]: 'saving' }));
        try {
          await upsertCard(card);
          setSaveStatus(s => ({ ...s, [card.id]: 'saved' }));
          setTimeout(() => {
            setSaveStatus(s => {
              const { [card.id]: _, ...rest } = s;
              return rest;
            });
          }, 2000);
        } catch (e) {
          console.error(e);
          setSaveStatus(s => ({ ...s, [card.id]: 'error' }));
          setGlobalMsg({ type: 'error', text: 'فشل الحفظ: ' + (e.message || e) });
        }
      }

      function resetCardToDefault(cardId) {
        const def = DEFAULT_CARDS.find(d => d.id === cardId);
        if (!def) return;
        const current = cards.find(c => c.id === cardId);
        const resetCard = { ...def, image_url: current?.image_url ?? null };
        updateCard(resetCard);
        saveCard(resetCard);
      }

      async function handleReseed() {
        if (!confirm('سيتم كتابة كل الكروت الافتراضية إلى Supabase. ستحل محل أي تعديلات سابقة (الصور لن تُحذف). متابعة؟')) return;
        setGlobalMsg({ type: 'info', text: 'جاري زرع الافتراضيات...' });
        try {
          await seedDefaults();
          await reload();
          setGlobalMsg({ type: 'success', text: '✓ تم زرع الكروت الافتراضية بنجاح.' });
          setTimeout(() => setGlobalMsg(null), 3000);
        } catch (e) {
          setGlobalMsg({ type: 'error', text: 'فشل الزرع: ' + (e.message || e) });
        }
      }

      async function handleResetAll() {
        if (!confirm('سيتم حذف كل بيانات الكروت من Supabase وإعادة زرع الافتراضيات. الصور المرفوعة في الـ Storage لن تُحذف. هل أنت متأكد؟')) return;
        if (!confirm('تأكيد ثانٍ: هذا الإجراء يمسح كل التعديلات.')) return;
        setGlobalMsg({ type: 'info', text: 'جاري إعادة التعيين...' });
        try {
          await deleteAllCards();
          await seedDefaults();
          await reload();
          setGlobalMsg({ type: 'success', text: '✓ تم إعادة التعيين بنجاح.' });
          setTimeout(() => setGlobalMsg(null), 3000);
        } catch (e) {
          setGlobalMsg({ type: 'error', text: 'فشل: ' + (e.message || e) });
        }
      }

      function handleExport() {
        const data = {
          cards: cards,
          settings: settings,
          exported_at: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `duelists-gambit-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      async function handleImport(file) {
        if (!file) return;
        if (!confirm('استيراد البيانات سيكتب فوق التعديلات الحالية. متابعة؟')) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data.cards) throw new Error('ملف غير صالح: لا يوجد حقل cards');
          for (const card of data.cards) {
            await upsertCard(card);
          }
          if (data.settings) await saveSettings(data.settings);
          await reload();
          setGlobalMsg({ type: 'success', text: '✓ تم الاستيراد بنجاح.' });
          setTimeout(() => setGlobalMsg(null), 3000);
        } catch (e) {
          setGlobalMsg({ type: 'error', text: 'فشل الاستيراد: ' + (e.message || e) });
        }
      }

      // واجهة التحميل
      if (loadState === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="font-display text-3xl text-yellow-400 mb-4">⚜</div>
              <div className="font-display text-xl text-yellow-300">جاري التحميل من Supabase...</div>
            </div>
          </div>
        );
      }

      if (loadState === 'error') {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="modal text-center">
              <div className="font-display text-2xl text-red-400 mb-4">⚠ خطأ في الاتصال</div>
              <div className="font-body text-gray-200 mb-4">{errorMsg}</div>
              <div className="font-body text-sm text-gray-400 mb-4">
                تأكد إنك:
                <ul className="list-disc list-inside mt-2 text-right">
                  <li>شغّلت ملف <code className="text-yellow-300">setup.sql</code> في Supabase SQL Editor.</li>
                  <li>أنشأت bucket باسم <code className="text-yellow-300">card-images</code> وجعلته Public.</li>
                  <li>الرابط والمفتاح في الكود صحيحين.</li>
                </ul>
              </div>
              <button className="btn" onClick={() => reload()}>إعادة المحاولة</button>
            </div>
          </div>
        );
      }

      const selectedCard = cards.find(c => c.id === selectedId);

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="px-6 py-3 border-b border-yellow-900/40 bg-black/40 sticky top-0 z-50 backdrop-blur">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <h1 className="font-display text-xl text-yellow-400 tracking-wider">⚙ لوحة التحكم</h1>
                <span className="font-display text-xs text-gray-500">Duelist's Gambit</span>
              </div>
              <div className="flex items-center gap-2">
                {profile?.avatar_url && (
                  <div className="flex items-center gap-2 px-2 py-1 rounded border border-yellow-900/40 bg-black/30">
                    <img src={profile.avatar_url} alt="" className="w-6 h-6 rounded-full" />
                    <span className="font-body text-sm text-yellow-300">{profile.display_name}</span>
                    <span className="text-xs px-1.5 py-0.5 rounded bg-yellow-600/30 text-yellow-200">أدمن</span>
                  </div>
                )}
                <button className="btn btn-crimson" onClick={onSignOut} style={{ padding: '0.5rem 0.9rem', fontSize: '0.75rem' }}>تسجيل خروج</button>
                <a href="index.html" className="btn">🎮 العودة للعبة</a>
              </div>
            </div>
          </header>

          {/* Global message */}
          {globalMsg && (
            <div className={`px-6 py-2 text-center font-body ${
              globalMsg.type === 'error' ? 'bg-red-950/50 text-red-300' :
              globalMsg.type === 'success' ? 'bg-green-950/50 text-green-300' :
              'bg-yellow-950/50 text-yellow-300'
            }`}>
              {globalMsg.text}
            </div>
          )}

          {/* Body */}
          <main className="p-4 md:p-6 max-w-7xl mx-auto">
            <AddCoinsPanel />

            <GlobalSettings
              cards={cards}
              settings={settings}
              onUpdateSettings={setSettings}
              onReseed={handleReseed}
              onResetAll={handleResetAll}
              onExport={handleExport}
              onImport={handleImport}
            />

            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
              <div className="lg:col-span-2">
                <CardList
                  cards={cards}
                  selectedId={selectedId}
                  onSelect={setSelectedId}
                />
              </div>
              <div className="lg:col-span-3">
                {selectedCard ? (
                  <CardEditor
                    card={selectedCard}
                    defaults={DEFAULT_CARDS}
                    onChange={updateCard}
                    onSave={saveCard}
                    onResetToDefault={() => resetCardToDefault(selectedCard.id)}
                    saveStatus={saveStatus[selectedCard.id]}
                  />
                ) : (
                  <div className="bg-black/40 border border-yellow-900/40 rounded-lg p-8 text-center">
                    <div className="font-display text-yellow-400 text-xl mb-2">⚜</div>
                    <p className="font-body text-gray-400">اختر كارتاً من القائمة لتعديله.</p>
                  </div>
                )}
              </div>
            </div>
          </main>

          <footer className="text-center py-4 text-xs text-gray-600 font-display border-t border-yellow-900/20 mt-8">
            ⚜ Duelist's Gambit Admin Panel ⚜
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppWithAuthGate />);
  </script>
</body>
</html>
