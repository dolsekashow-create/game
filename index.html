<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duelist's Gambit — مبارزة الشطرنج السحري</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-mid: #15131c;
      --bg-light: #1f1c2a;
      --gold: #c9a961;
      --gold-bright: #e8c876;
      --gold-dim: #8a7544;
      --crimson: #8b1a1a;
      --crimson-bright: #c43434;
      --p1: #d4a04a;
      --p1-dark: #6b4a1a;
      --p2: #6b8cff;
      --p2-dark: #2a3a8a;
      --frame-unit: #c9a961;
      --frame-spell: #6b8cff;
      --frame-trap: #c43434;
      --text-soft: #d8d2c4;
      --text-dim: #8a8275;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-deep);
      color: var(--text-soft);
      font-family: 'Cormorant Garamond', 'Amiri', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(ellipse at top, #1a1530 0%, transparent 60%),
        radial-gradient(ellipse at bottom, #1a1020 0%, transparent 60%),
        var(--bg-deep);
      background-attachment: fixed;
    }

    /* Subtle grain overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 9999;
    }

    .font-display { font-family: 'Cinzel', serif; letter-spacing: 0.04em; }
    .font-body { font-family: 'Cormorant Garamond', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .font-ar { font-family: 'Amiri', serif; }

    /* Board styling */
    .board-cell {
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid rgba(201, 169, 97, 0.08);
    }
    .board-cell.light {
      background: linear-gradient(135deg, #2d2620 0%, #221c17 100%);
    }
    .board-cell.dark {
      background: linear-gradient(135deg, #15110d 0%, #0d0a07 100%);
    }
    .board-cell.valid-move {
      box-shadow: inset 0 0 0 3px rgba(105, 200, 105, 0.6);
      background: rgba(105, 200, 105, 0.08);
    }
    .board-cell.valid-attack {
      box-shadow: inset 0 0 0 3px rgba(220, 60, 60, 0.7);
      background: rgba(220, 60, 60, 0.12);
    }
    .board-cell.valid-summon {
      box-shadow: inset 0 0 0 3px rgba(201, 169, 97, 0.7);
      background: rgba(201, 169, 97, 0.10);
    }
    .board-cell.valid-target {
      box-shadow: inset 0 0 0 3px rgba(150, 100, 220, 0.7);
      background: rgba(150, 100, 220, 0.12);
    }
    .board-cell.selected {
      box-shadow: inset 0 0 0 3px var(--gold-bright);
      background: rgba(232, 200, 118, 0.15);
    }
    .board-cell:hover:not(.valid-move):not(.valid-attack):not(.valid-summon):not(.valid-target):not(.selected) {
      filter: brightness(1.2);
    }

    /* Coordinate labels */
    .coord-label {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      color: rgba(201, 169, 97, 0.4);
      pointer-events: none;
    }
    .coord-label.row { left: 4px; top: 2px; }
    .coord-label.col { right: 4px; bottom: 2px; }

    /* Piece on board */
    .piece {
      position: absolute;
      inset: 6%;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s ease;
      overflow: hidden;
    }
    .piece:hover {
      transform: scale(1.05);
      z-index: 10;
    }
    .piece.p1 {
      background: linear-gradient(135deg, #4a3010 0%, #2a1d0a 70%, #1a1208 100%);
      border: 2px solid var(--p1);
    }
    .piece.p2 {
      background: linear-gradient(135deg, #1d2855 0%, #0f1535 70%, #08102a 100%);
      border: 2px solid var(--p2);
    }
    .piece.king.p1 {
      background: linear-gradient(135deg, #6b3a08 0%, #3a200a 70%, #1d100a 100%);
      border: 2px solid var(--gold-bright);
      box-shadow: 0 0 12px rgba(232, 200, 118, 0.4), 0 2px 12px rgba(0,0,0,0.5);
    }
    .piece.king.p2 {
      background: linear-gradient(135deg, #2d3a8a 0%, #18205a 70%, #0a0e3a 100%);
      border: 2px solid #a0b8ff;
      box-shadow: 0 0 12px rgba(160, 184, 255, 0.4), 0 2px 12px rgba(0,0,0,0.5);
    }
    .piece-name {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      font-weight: 700;
      text-align: center;
      color: var(--text-soft);
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    .piece-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .stat-atk { color: #ff8866; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    .stat-hp { color: #66cc99; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    .piece.sick { opacity: 0.55; }
    .piece.sick::after {
      content: "💤";
      position: absolute;
      top: -2px;
      right: -2px;
      font-size: 0.7rem;
    }

    /* Trap on board */
    .trap-marker {
      position: absolute;
      inset: 20%;
      background: linear-gradient(135deg, #4a1010 0%, #2a0808 100%);
      border: 2px solid var(--crimson-bright);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--crimson-bright);
      font-size: 1.4rem;
      font-weight: 900;
      box-shadow: 0 0 10px rgba(196, 52, 52, 0.4), inset 0 0 8px rgba(0,0,0,0.5);
      animation: pulse-trap 2.5s ease-in-out infinite;
    }
    @keyframes pulse-trap {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 0.5; }
    }

    /* Card styling */
    .card {
      width: 130px;
      min-height: 195px;
      background: linear-gradient(165deg, #1a1622 0%, #100c18 100%);
      border-radius: 8px;
      padding: 6px;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .card.unit { border: 2px solid var(--frame-unit); }
    .card.spell { border: 2px solid var(--frame-spell); }
    .card.trap { border: 2px solid var(--frame-trap); }
    .card:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 12px 24px rgba(0,0,0,0.8), 0 0 20px rgba(201,169,97,0.3);
      z-index: 50;
    }
    .card.selected {
      transform: translateY(-16px) scale(1.06);
      box-shadow: 0 16px 28px rgba(0,0,0,0.8), 0 0 32px var(--gold-bright);
    }
    .card.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .card.unaffordable:hover {
      transform: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
      padding: 0 2px;
      margin-bottom: 4px;
    }
    .card-cost {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6b8cff 0%, #2a3a8a 100%);
      border: 1.5px solid #a0b8ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.75rem;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(107, 140, 255, 0.5);
    }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gold-bright);
      line-height: 1;
      text-align: right;
      flex: 1;
    }
    .card-image {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #2a2530 0%, #15101a 100%);
      border: 1px solid rgba(201,169,97,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(201,169,97,0.3);
      font-size: 2.5rem;
      overflow: hidden;
      position: relative;
    }
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-image-placeholder {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      color: rgba(201,169,97,0.4);
      text-align: center;
      padding: 4px;
      line-height: 1.2;
    }
    .card-type-badge {
      position: absolute;
      bottom: 6px;
      left: 6px;
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(0,0,0,0.7);
      color: var(--gold);
      text-transform: uppercase;
    }
    .card-stats-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-top: 4px;
      padding: 3px 4px;
      background: rgba(0,0,0,0.4);
      border-radius: 4px;
      border: 1px solid rgba(201,169,97,0.15);
    }
    .card-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .card-desc {
      font-family: 'Cormorant Garamond', 'Amiri', serif;
      font-size: 0.65rem;
      color: var(--text-soft);
      line-height: 1.2;
      margin-top: 4px;
      padding: 0 2px;
      font-style: italic;
      flex-grow: 1;
    }
    .card-move {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Card back (for opponent's hand) */
    .card-back {
      width: 70px;
      min-height: 100px;
      background:
        repeating-linear-gradient(45deg, #2a1a3a 0px, #2a1a3a 4px, #1a1028 4px, #1a1028 8px),
        #2a1a3a;
      border: 2px solid var(--gold-dim);
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      color: var(--gold-bright);
      font-size: 1.4rem;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 0 12px rgba(0,0,0,0.4);
    }

    /* Buttons */
    .btn {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 0.6rem 1.4rem;
      border: 1.5px solid var(--gold);
      background: linear-gradient(135deg, rgba(201,169,97,0.15) 0%, rgba(201,169,97,0.05) 100%);
      color: var(--gold-bright);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .btn:hover {
      background: linear-gradient(135deg, rgba(201,169,97,0.3) 0%, rgba(201,169,97,0.15) 100%);
      box-shadow: 0 0 16px rgba(201,169,97,0.4);
    }
    .btn:active { transform: translateY(1px); }
    .btn-crimson {
      border-color: var(--crimson-bright);
      color: var(--crimson-bright);
      background: linear-gradient(135deg, rgba(196,52,52,0.15) 0%, rgba(196,52,52,0.05) 100%);
    }
    .btn-crimson:hover {
      background: linear-gradient(135deg, rgba(196,52,52,0.3) 0%, rgba(196,52,52,0.15) 100%);
      box-shadow: 0 0 16px rgba(196,52,52,0.4);
    }

    /* Mana orb */
    .mana-orb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .mana-orb.full {
      background: radial-gradient(circle at 30% 30%, #a0b8ff 0%, #4a6acc 60%, #1a2a6c 100%);
      box-shadow: 0 0 10px rgba(107, 140, 255, 0.5);
      color: white;
    }
    .mana-orb.empty {
      background: radial-gradient(circle at 30% 30%, #3a3a4a 0%, #1a1a25 100%);
      color: var(--text-dim);
      box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
    }

    /* HP bar (for king) */
    .hp-bar {
      width: 100%;
      height: 8px;
      background: #2a1010;
      border: 1px solid var(--crimson);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c43434 0%, #ff5544 50%, #c43434 100%);
      transition: width 0.4s ease;
    }

    /* Action log */
    .log-entry {
      font-size: 0.85rem;
      padding: 0.3rem 0.5rem;
      margin-bottom: 0.25rem;
      background: rgba(255,255,255,0.02);
      border-right: 2px solid var(--gold-dim);
      border-radius: 3px;
      color: var(--text-soft);
      animation: log-in 0.3s ease;
    }
    @keyframes log-in {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .log-entry.p1 { border-right-color: var(--p1); }
    .log-entry.p2 { border-right-color: var(--p2); }
    .log-entry.combat { border-right-color: var(--crimson-bright); }
    .log-entry.summon { border-right-color: var(--gold-bright); }
    .log-entry.system { border-right-color: var(--text-dim); font-style: italic; color: var(--text-dim); }

    /* Tooltip */
    .tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      background: var(--bg-mid);
      border: 1px solid var(--gold);
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .has-tooltip:hover .tooltip { opacity: 1; }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 12, 0.85);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: linear-gradient(165deg, #1a1622 0%, #100c18 100%);
      border: 2px solid var(--gold);
      border-radius: 8px;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(201,169,97,0.3);
    }

    /* Phase indicator */
    .phase-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      border: 2px solid var(--gold);
      padding: 2rem 4rem;
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: var(--gold-bright);
      z-index: 500;
      box-shadow: 0 0 40px rgba(201,169,97,0.5);
      animation: banner 1.8s ease forwards;
      pointer-events: none;
    }
    @keyframes banner {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20%, 80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-mid); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* Decorative line */
    .ornament-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gold-dim);
    }
    .ornament-line::before, .ornament-line::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .card { width: 110px; min-height: 165px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

    // CARDS و CARD_BY_ID متغيرات قابلة للتحديث من Supabase
    let CARDS = [...DEFAULT_CARDS];
    let CARD_BY_ID = Object.fromEntries(CARDS.map(c => [c.id, c]));
    let CARD_BACK_IMAGE = null; // رابط صورة ضهر الكروت (من Supabase أو null)

    // تحميل البيانات من Supabase. لو فشل، نستعمل الافتراضات.
    async function loadFromSupabase() {
      try {
        // تحميل الكروت
        const { data: cardsData, error: cardsErr } = await sb
          .from('cards')
          .select('*');
        if (!cardsErr && cardsData && cardsData.length > 0) {
          // دمج: نأخذ الكارت من DB، ولو ناقصة حقول نأخذها من الافتراضي
          CARDS = DEFAULT_CARDS.map(def => {
            const db = cardsData.find(c => c.id === def.id);
            if (!db) return def;
            return {
              ...def,
              name_en: db.name_en ?? def.name_en,
              name_ar: db.name_ar ?? def.name_ar,
              type: db.type ?? def.type,
              cost: db.cost ?? def.cost,
              movement: db.movement ?? def.movement,
              atk: db.atk ?? def.atk,
              hp: db.hp ?? def.hp,
              desc_ar: db.desc_ar ?? def.desc_ar,
              icon: db.icon ?? def.icon,
              image: db.image_url ?? def.image,
              ability: db.ability ?? def.ability,
              target: db.target ?? def.target,
              effect: db.effect ?? def.effect,
              damage: db.damage ?? def.damage
            };
          });
          CARD_BY_ID = Object.fromEntries(CARDS.map(c => [c.id, c]));
        }
        // تحميل الإعدادات (صورة ضهر الكروت)
        const { data: settingsData, error: settingsErr } = await sb
          .from('settings')
          .select('*')
          .eq('id', 1)
          .maybeSingle();
        if (!settingsErr && settingsData?.card_back_url) {
          CARD_BACK_IMAGE = settingsData.card_back_url;
        }
        return { ok: true };
      } catch (e) {
        console.warn('Supabase load failed, using defaults:', e);
        return { ok: false, error: e };
      }
    }

    // ════════════════════════════════════════════════════════════
    // ملك كل لاعب — وحدة خاصة، غير موجودة في الديك
    // ════════════════════════════════════════════════════════════
    const KING_TEMPLATE = {
      id: 'king',
      name_en: 'King',
      name_ar: 'الملك',

      isKing: true,
      movement: 'king',
