    // AdminAddCoinsModal — شحن لاعب بـ Player ID (للأدمن فقط)
    // ════════════════════════════════════════════════════════════
    function AdminAddCoinsModal({ onClose }) {
      const [playerId, setPlayerId] = React.useState('#');
      const [amount, setAmount] = React.useState('');
      const [busy, setBusy] = React.useState(false);
      const [result, setResult] = React.useState(null);
      const [error, setError] = React.useState(null);

      // الباقات الجاهزة للضغطة السريعة
      const quickAmounts = [500, 1000, 2500, 5000, 7500];

      async function handleSubmit() {
        setError(null);
        setResult(null);

        const cleanedId = playerId.trim().toUpperCase();
        const amt = parseInt(amount, 10);

        if (!cleanedId || cleanedId === '#') {
          setError('اكتب Player ID');
          return;
        }
        if (isNaN(amt) || amt === 0) {
          setError('اكتب مبلغ صحيح');
          return;
        }

        setBusy(true);
        const { data, error: rpcError } = await sb.rpc('admin_add_coins', {
          target_player_id: cleanedId,
          amount: amt,
        });
        setBusy(false);

        if (rpcError) {
          setError(rpcError.message || 'حصل خطأ');
          return;
        }
        if (data?.success) {
          setResult(data);
          setPlayerId('#');
          setAmount('');
        } else {
          setError('حصل خطأ غير متوقع');
        }
      }

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '420px' }}>
            <h2 className="font-display text-xl text-yellow-400 mb-1 text-center">💰 شحن لاعب</h2>
            <p className="text-center text-gray-500 text-sm font-body mb-4">
              ادخل Player ID والمبلغ
            </p>

            {/* Player ID */}
            <div className="mb-3">
              <label className="block text-xs text-gray-400 mb-1">معرّف اللاعب (Player ID)</label>
              <input
                type="text"
                value={playerId}
                onChange={e => {
                  let v = e.target.value.toUpperCase();
                  if (v && !v.startsWith('#')) v = '#' + v.replace(/^#+/, '');
                  setPlayerId(v);
                }}
                placeholder="#ABC123"
                className="w-full px-3 py-2 rounded font-mono text-yellow-300"
                style={{
                  background: 'rgba(0,0,0,0.4)',
                  border: '1px solid #5a4a2a',
                  letterSpacing: '0.1em',
                  fontSize: '1.1rem',
                  textAlign: 'center',
                }}
                disabled={busy}
              />
            </div>

            {/* المبلغ */}
            <div className="mb-3">
              <label className="block text-xs text-gray-400 mb-1">المبلغ (يمكن سالب للخصم)</label>
              <input
                type="number"
                value={amount}
                onChange={e => setAmount(e.target.value)}
                placeholder="1000"
                className="w-full px-3 py-2 rounded font-mono text-yellow-300"
                style={{
                  background: 'rgba(0,0,0,0.4)',
                  border: '1px solid #5a4a2a',
                  fontSize: '1.1rem',
                  textAlign: 'center',
                }}
                disabled={busy}
              />

              {/* أزرار سريعة */}
              <div className="flex gap-1 flex-wrap mt-2">
                {quickAmounts.map(a => (
                  <button
                    key={a}
                    type="button"
                    onClick={() => setAmount(String(a))}
                    disabled={busy}
                    style={{
                      padding: '0.25rem 0.6rem',
                      fontSize: '0.75rem',
                      background: 'rgba(201,169,97,0.1)',
                      border: '1px solid #5a4a2a',
                      borderRadius: '4px',
                      color: '#c9a961',
                      cursor: 'pointer',
                      fontFamily: 'monospace',
                    }}
                  >
                    +{a.toLocaleString('en-US')}
                  </button>
                ))}
              </div>
            </div>

            {/* رسالة خطأ */}
            {error && (
              <div className="mb-3 p-3 rounded text-sm" style={{
                background: 'rgba(180,40,40,0.15)',
                border: '1px solid #7a2020',
                color: '#ff9090',
              }}>
                ⚠ {error}
              </div>
            )}

            {/* رسالة نجاح */}
            {result && (
              <div className="mb-3 p-3 rounded text-sm" style={{
                background: 'rgba(40,140,80,0.15)',
                border: '1px solid #2a6a4a',
                color: '#9eeac0',
              }}>
                ✓ تم تحويل <b>{result.amount_added.toLocaleString('en-US')}</b> عملة
                إلى <b className="text-yellow-300">{result.display_name}</b> ({result.player_id})
                <br />
                <span style={{ color: '#7ac09a' }}>
                  الرصيد القديم: {result.old_balance.toLocaleString('en-US')}
                  → الجديد: <b>{result.new_balance.toLocaleString('en-US')}</b>
                </span>
              </div>
            )}

            {/* الأزرار */}
            <div className="flex gap-2 justify-end mt-4">
              <button className="btn" onClick={onClose} disabled={busy}>
                إغلاق
              </button>
              <button
                className="btn"
                onClick={handleSubmit}
                disabled={busy}
                style={{ background: 'linear-gradient(180deg, #c9a961, #8a7340)', color: '#1a1024', fontWeight: 'bold' }}
              >
                {busy ? '... جاري التنفيذ' : '✓ تأكيد الشحن'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function MatchmakingModal({ matchmaking, matchTimer, setMatchTimer, setMatchmaking, setMode, onMatched, botName, user }) {
      const timerRef = React.useRef(null);
      const channelRef = React.useRef(null);
      const pollRef = React.useRef(null);
      const myEntryId = React.useRef(null);
      const resolvedRef = React.useRef(false);

      React.useEffect(() => {
        if (matchmaking !== 'searching') return;
        resolvedRef.current = false;

        // 1) أضف نفسك للـ queue
        async function joinQueue() {
          console.log('[MM] joinQueue start, user:', user?.id);

          // امسح أي entry قديم
          const del = await sb.from('matchmaking_queue').delete().eq('user_id', user.id);
          console.log('[MM] delete old:', del.error || 'ok');

          const { data, error } = await sb.from('matchmaking_queue').insert({
            user_id: user.id,
            display_name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'لاعب',
            status: 'waiting'
          }).select().single();

          console.log('[MM] insert result:', error || data);

          if (error || !data) { console.error('[MM] insert failed:', error); fallbackToBot(); return; }
          myEntryId.current = data.id;
          console.log('[MM] my entry id:', data.id);

          // polling كل ثانية
          pollRef.current = setInterval(() => pollForMatch(data.id), 1000);
          await pollForMatch(data.id);
        }

        async function pollForMatch(myId) {
          if (resolvedRef.current) return;

          // هل أنا اتطابقت؟
          const { data: me, error: meErr } = await sb
            .from('matchmaking_queue')
            .select('status, matched_with, game_id')
            .eq('id', myId)
            .maybeSingle();

          console.log('[MM] my status:', me?.status, meErr?.message);

          if (me?.status === 'matched' && me.matched_with && me.game_id && !resolvedRef.current) {
            resolvedRef.current = true;
            handleMatch(me.matched_with, me.game_id);
            return;
          }

          // ابحث عن لاعب ينتظر
          const { data: waiting, error: wErr } = await sb
            .from('matchmaking_queue')
            .select('id, user_id, display_name')
            .eq('status', 'waiting')
            .neq('user_id', user.id)
            .order('joined_at', { ascending: true })
            .limit(1);

          console.log('[MM] waiting players:', waiting?.length, wErr?.message);

          if (waiting && waiting.length > 0 && !resolvedRef.current) {
            const opponent = waiting[0];
            const gameId = 'game_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            console.log('[MM] found opponent:', opponent.user_id, '— matching as game', gameId);

            // .select() بيرجّع الصفوف اللي اتعدّلت فعلاً
            const [r1, r2] = await Promise.all([
              sb.from('matchmaking_queue').update({ status: 'matched', matched_with: user.id, game_id: gameId }).eq('id', opponent.id).eq('status', 'waiting').select(),
              sb.from('matchmaking_queue').update({ status: 'matched', matched_with: opponent.user_id, game_id: gameId }).eq('id', myId).eq('status', 'waiting').select(),
            ]);

            const winRace = (r1.data?.length || 0) > 0 && (r2.data?.length || 0) > 0;
            console.log('[MM] match win:', winRace, 'r1:', r1.error?.message || 'ok', 'r2:', r2.error?.message || 'ok');

            if (winRace && !resolvedRef.current) {
              resolvedRef.current = true;
              handleMatch(opponent.user_id, gameId);
            }
          }
        }

        // إنشاء/قراءة اللعبة وانتقال لوضع الأونلاين
        async function handleMatch(opponentUserId, gameId) {
          console.log('[MM] handleMatch with opponent:', opponentUserId, 'game:', gameId);

          // اقرأ اسم الخصم من profiles
          const { data: oppProfile } = await sb.from('profiles').select('display_name').eq('id', opponentUserId).maybeSingle();
          const myName = user.user_metadata?.full_name || user.email?.split('@')[0] || 'لاعب';
          const oppName = oppProfile?.display_name || 'لاعب';

          // قاعدة ثابتة: الـ user_id الأصغر هو اللي ينشئ اللعبة + يبقى اللاعب 1
          // (UUIDs عشوائية، فالنتيجة عشوائية بين كل زوج)
          const iAmCreator = user.id < opponentUserId;
          const player1_id = iAmCreator ? user.id : opponentUserId;
          const player2_id = iAmCreator ? opponentUserId : user.id;
          const iAmPlayer1 = user.id === player1_id;

          if (iAmCreator) {
            // أنا اللي بنشئ اللعبة
            const initialState = makeInitialState();
            const gameRow = {
              id: gameId,
              player1_id,
              player2_id,
              player1_name: iAmPlayer1 ? myName : oppName,
              player2_name: iAmPlayer1 ? oppName : myName,
              state: initialState,
              status: 'active',
            };
            const { error } = await sb.from('games').insert(gameRow);
            if (error) console.warn('[MM] game insert error:', error.message);
            else console.log('[MM] game created');
          } else {
            // أستنى المُنشئ يعمل insert
            let retries = 0;
            let exists = false;
            while (!exists && retries < 30) {
              const { data } = await sb.from('games').select('id').eq('id', gameId).maybeSingle();
              if (data) { exists = true; break; }
              await new Promise(r => setTimeout(r, 200));
              retries++;
            }
            if (!exists) {
              console.error('[MM] game never appeared — falling back to bot');
              fallbackToBot();
              return;
            }
            console.log('[MM] game found, joining as player', iAmPlayer1 ? 1 : 2);
          }

          // عرض شاشة "وُجد لاعب" ثم الانتقال للعبة
          setMatchmaking('found');
          cleanup();
          setTimeout(() => {
            setMatchmaking(null);
            onMatched({
              gameId,
              myPlayerNum: iAmPlayer1 ? 1 : 2,
              myName,
              opponentName: oppName,
              player1_id,
              player2_id,
            });
          }, 1500);
        }

        function fallbackToBot() {
          if (resolvedRef.current) return;
          resolvedRef.current = true;
          setMatchmaking('bot');
          cleanup();
          setTimeout(() => { setMatchmaking(null); setMode('1p'); }, 2000);
        }

        function cleanup() {
          clearInterval(timerRef.current);
          clearInterval(pollRef.current);
          if (channelRef.current) sb.removeChannel(channelRef.current);
          if (myEntryId.current) sb.from('matchmaking_queue').delete().eq('id', myEntryId.current).then(() => {});
        }

        // العد التنازلي
        timerRef.current = setInterval(() => {
          setMatchTimer(t => {
            if (t <= 1) {
              clearInterval(timerRef.current);
              if (!resolvedRef.current) fallbackToBot();
              return 0;
            }
            return t - 1;
          });
        }, 1000);

        joinQueue();

        return () => {
          cleanup();
        };
      }, []);

      function cancelSearch() {
        clearInterval(timerRef.current);
        clearInterval(pollRef.current);
        if (channelRef.current) sb.removeChannel(channelRef.current);
        if (myEntryId.current) sb.from('matchmaking_queue').delete().eq('id', myEntryId.current).then(() => {});
        setMatchmaking(null);
      }

      return (
        <div className="modal-backdrop">
          <div className="modal" style={{ maxWidth: '320px', textAlign: 'center' }}>
            {matchmaking === 'searching' && (
              <>
                <div style={{ fontSize: '3rem', marginBottom: '0.5rem', animation: 'float 1.5s ease-in-out infinite' }}>🔍</div>
                <h2 className="font-display text-xl text-yellow-400 mb-2">جاري البحث عن لاعب...</h2>
                <div style={{
                  width: '80px', height: '80px', borderRadius: '50%', margin: '0.5rem auto',
                  border: '4px solid rgba(201,169,97,0.2)', borderTopColor: '#c9a961',
                  animation: 'spin 1s linear infinite'
                }} />
                <div className="font-display text-3xl text-yellow-300 my-3">{matchTimer}</div>
                <p className="font-body text-sm text-gray-400">نبحث عن لاعب حقيقي...</p>
                <button className="btn btn-crimson mt-4" onClick={cancelSearch}>إلغاء</button>
              </>
            )}
            {matchmaking === 'found' && (
              <>
                <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>⚔️</div>
                <h2 className="font-display text-xl text-yellow-400 mb-2">وُجد لاعب!</h2>
                <p className="font-body text-gray-300">جاري الدخول للمبارزة...</p>
              </>
            )}
            {matchmaking === 'bot' && (
              <>
                <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>🤖</div>
                <h2 className="font-display text-xl text-yellow-400 mb-2">لم يُوجد لاعب</h2>
                <p className="font-body text-gray-300">ستلعب ضد <b className="text-yellow-300">{botName}</b></p>
              </>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    // App — Shell بيلوّد البيانات + يطلب تسجيل دخول إجباري
    // ════════════════════════════════════════════════════════════
    function App() {
      const [bootState, setBootState] = useState('login'); // login | ready
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);

      // تحميل أولي في الخلفية
      useEffect(() => {
        let alive = true;

        // ══ الـ listener لازم يتسجّل أول حاجة قبل أي async ══
        // عشان يمسك حدث SIGNED_IN اللي بيجي من الـ hash بعد OAuth redirect
        const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
          if (!alive) return;
          if (session?.user) {
            setUser(session.user);
            try {
              if (event === 'SIGNED_IN') {
                await sb.from('profiles').upsert({
                  id: session.user.id,
                  display_name: session.user.user_metadata?.full_name || session.user.email?.split('@')[0] || 'لاعب',
                  avatar_url: session.user.user_metadata?.avatar_url || null,
                  last_seen: new Date().toISOString(),
                }, { onConflict: 'id', ignoreDuplicates: false });
              } else {
                // تحديث last_seen في كل مرة
                await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', session.user.id);
              }
              const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
              if (alive) setProfile(p);
            } catch (e) {
              console.warn('Profile fetch/upsert failed:', e);
            } finally {
              if (alive) setBootState('ready');
            }
          } else {
            setUser(null);
            setProfile(null);
            setBootState('login');
          }
        });

        // بعد تسجيل الـ listener، نحمّل الكروت ونفحص الجلسة الحالية
        (async () => {
          // تحميل بيانات الكروت من Supabase
          await Promise.race([
            loadFromSupabase(),
            new Promise(res => setTimeout(res, 5000))
          ]);
          if (!alive) return;

          // implicit flow: الـ access_token في الـ hash — Supabase يقرأه تلقائياً
          // بس محتاجين ننتظر شوية عشان onAuthStateChange يشتغل أول
          const hasHash = window.location.hash && window.location.hash.includes('access_token=');
          if (hasHash) {
            // امسح الـ hash بعد ثانية عشان Supabase يقراه الأول
            setTimeout(() => {
              window.history.replaceState(null, '', window.location.pathname);
            }, 3000);
            // مش محتاجين نعمل حاجة تانية — onAuthStateChange هيشتغل تلقائياً
            return;
          }

          // فحص جلسة موجودة (للمستخدم اللي سجّل دخوله من قبل)
          try {
            const { data: { session } } = await sb.auth.getSession();
            if (alive && session?.user) {
              setUser(session.user);
              try {
                const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (alive) setProfile(p);
              } catch (e) {
                console.warn('Profile fetch failed:', e);
              } finally {
                if (alive) setBootState('ready');
              }
            }
          } catch (e) {
            console.warn('getSession error:', e);
          }
        })();

        return () => { alive = false; subscription?.unsubscribe(); };
      }, []);

      // إعادة تحميل البروفايل (مثلاً بعد لعبة عشان نشوف العملات الجديدة)
      async function refreshProfile() {
        if (!user) return;
        // تحديث last_seen للكشف عن اللاعبين المتاحين
        await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', user.id);
        const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        if (p) setProfile(p);
      }

      async function handleGoogle() {
        try {
          const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: 'https://game-wheat-three.vercel.app/',
            }
          });
          if (error) {
            if (error.message?.includes('not enabled') || error.message?.includes('Unsupported provider')) {
              return { error: 'Google OAuth مش مفعّل في Supabase. استخدم الإيميل أو فعّل Google من Dashboard.' };
            }
            return { error: error.message };
          }
          return {};
        } catch (e) {
          return { error: e.message };
        }
      }

      async function handleSignOut() {
        await sb.auth.signOut();
        window.location.href = window.location.pathname;
      }

      // لو لسه في الـ background loading، اعرض login في الوقت ده
      if (bootState === 'login' || !user) {
        return <LoginScreen onGoogle={handleGoogle} />;
      }

      // اللعبة (محتاج user و profile)
      return (
        <div className="app-container">
          <Game
            user={user}
            profile={profile}
            onSignOut={handleSignOut}
            onRefreshProfile={refreshProfile}
          />
        </div>
      );
    }

    function Game({ user, profile, onSignOut, onRefreshProfile }) {
      const [state, dispatch] = useReducer(gameReducer, undefined, makeInitialState);
      const [mode, setMode] = useState('menu'); // 'menu' | '1p' | '2p' | 'online'
      const [onlineGame, setOnlineGame] = useState(null); // {gameId, myPlayerNum, opponentName, player1_id, player2_id}
      const [onlineLoading, setOnlineLoading] = useState(false);
      const [showRules, setShowRules] = useState(false);
      const [showPassScreen, setShowPassScreen] = useState(false);
      const [previousPlayer, setPreviousPlayer] = useState(1);
      const logRef = useRef(null);
      const aiRef = useRef({ phase: 'idle', pendingMoveTarget: null, unitList: null, unitIndex: 0 });

      // ──────────────────────────────────────────────────
      // ONLINE MULTIPLAYER: تحميل أولي + اشتراك realtime
      // ──────────────────────────────────────────────────
      useEffect(() => {
        if (mode !== 'online' || !onlineGame?.gameId) return;
        let alive = true;
        setOnlineLoading(true);

        // 1) تحميل أولي
        (async () => {
          const { data, error } = await sb.from('games')
            .select('state, status, winner_id')
            .eq('id', onlineGame.gameId)
            .maybeSingle();
          if (!alive) return;
          if (error || !data) {
            console.error('[Online] initial load failed:', error?.message);
            setMode('menu'); setOnlineGame(null);
            return;
          }
          dispatch({ type: 'REPLACE_STATE', state: data.state });
          setOnlineLoading(false);
        })();

        // 2) اشتراك realtime
        const channel = sb.channel(`game-${onlineGame.gameId}`)
          .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'games',
            filter: `id=eq.${onlineGame.gameId}`,
          }, (payload) => {
            if (!alive) return;
            if (payload.new?.state) {
              dispatch({ type: 'REPLACE_STATE', state: payload.new.state });
            }
          })
          .subscribe((status) => {
            console.log('[Online] channel status:', status);
          });

        return () => {
          alive = false;
          sb.removeChannel(channel);
        };
      }, [mode, onlineGame?.gameId]);

      // ──────────────────────────────────────────────────
      // dispatch مع مزامنة للأونلاين (يحدّث الـ DB بعد كل حركة)
      // ──────────────────────────────────────────────────
      const onlineGameRef = useRef(onlineGame);
      onlineGameRef.current = onlineGame;
      const stateRef = useRef(state);
      stateRef.current = state;

      const syncedDispatch = React.useCallback((action) => {
        const og = onlineGameRef.current;
        const curState = stateRef.current;

        // مش في الأونلاين → dispatch عادي
        if (mode !== 'online' || !og) {
          dispatch(action);
          return;
        }

        // REPLACE_STATE من الـ realtime → dispatch مباشر بدون مزامنة
        if (action.type === 'REPLACE_STATE') {
          dispatch(action);
          return;
        }

        // أكشن من المستخدم: لازم يكون دوره
        if (action.type !== 'NEW_GAME' && curState.currentPlayer !== og.myPlayerNum) {
          console.log('[Online] ignored action — not your turn:', action.type);
          return;
        }

        // احسب الحالة الجديدة محلياً (للتطبيق الفوري)
        const newState = gameReducer(curState, action);
        if (newState === curState) return; // مفيش تغيير

        // طبّق محلياً + حدّث الـ ref فوراً (عشان كليكس متتالية)
        dispatch({ type: 'REPLACE_STATE', state: newState });
        stateRef.current = newState;

        // اطلع على الـ DB
        const updateRow = {
          state: newState,
          updated_at: new Date().toISOString(),
          last_action_at: new Date().toISOString(),
        };
        if (newState.winner) {
          updateRow.status = 'finished';
          updateRow.winner_id = newState.winner === 1 ? og.player1_id : og.player2_id;
        }
        sb.from('games').update(updateRow).eq('id', og.gameId).then(({ error }) => {
          if (error) console.error('[Online] sync failed:', error.message);
        });
      }, [mode]);

      // عند تغيير الدور، اعرض شاشة "سلّم الجهاز"
      useEffect(() => {
        if (state.currentPlayer !== previousPlayer && !state.winner) {
          setPreviousPlayer(state.currentPlayer);
          setFlippedCardIdx(null); // ارجع كل الكروت على ضهرها
          if (mode === '1p') {
            if (state.currentPlayer === 1) setShowPassScreen(true);
          } else if (mode === '2p') {
            setShowPassScreen(true);
          }
          // online mode: مفيش شاشة "سلّم الجهاز" — كل لاعب على جهازه
        }
      }, [state.currentPlayer, state.winner, mode]);

      // AI — يلعب دور اللاعب 2 تلقائياً
      useEffect(() => {
        if (state.winner || mode !== '1p' || state.currentPlayer !== 2) {
          aiRef.current = { phase: 'idle', pendingMoveTarget: null, unitList: null, unitIndex: 0 };
          return;
        }
        const timer = setTimeout(() => {
          const action = computeAIAction(state, aiRef.current);
          if (action) dispatch(action);
        }, 700);
        return () => clearTimeout(timer);
      }, [state, mode]);

      // تمرير السجل لآخر سطر
      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [state.log.length]);

      // عند ظهور لافتة (ماعدا في دور AI بوضع 1p)
      const [showBanner, setShowBanner] = useState(null);
      useEffect(() => {
        if (state.bannerText) {
          if (mode === '1p' && state.currentPlayer === 2) return;
          setShowBanner(state.bannerText);
          const t = setTimeout(() => setShowBanner(null), 1800);
          return () => clearTimeout(t);
        }
      }, [state.bannerText, mode]);

      const highlights = useMemo(() => computeHighlights(state), [state]);
      // في الأونلاين: الأسفل دايماً = أنا (myPlayerNum)، الأعلى = خصمي.
      // في 1p/2p: زي الأصل (الأسفل = اللي دوره دلوقتي).
      const isOnlineMode = mode === 'online' && onlineGame;
      const bottomPlayerNum = isOnlineMode ? onlineGame.myPlayerNum : state.currentPlayer;
      const otherPlayerNum = bottomPlayerNum === 1 ? 2 : 1;
      const currentPlayerData = state.players[bottomPlayerNum];
      const isMyTurn = !isOnlineMode || state.currentPlayer === onlineGame.myPlayerNum;

      // إيجاد ملوك الاعبين على الرقعة (لعرض الصحة)
      function findKing(num) {
        for (let r = 0; r < BOARD_SIZE; r++)
          for (let c = 0; c < BOARD_SIZE; c++) {
            const u = state.board[r][c].unit;
            if (u && u.isKing && u.playerNum === num) return u;
          }
        return null;
      }
      const king1 = findKing(1);
      const king2 = findKing(2);

      // ── State للقائمة المنسدلة ──

      const [showRecharge, setShowRecharge] = useState(false);
      const [showAdminCoins, setShowAdminCoins] = useState(false);

      const [matchmaking, setMatchmaking] = useState(null); // null | 'searching' | 'found' | 'bot'
      const [matchTimer, setMatchTimer] = useState(0);
      const [botName] = useState(() => {
        const names = ['الفارس الأسود','الساحر الخفي','تنين الصحراء','فارس النيل','الظل المقاتل','محارب الفجر'];
        return names[Math.floor(Math.random() * names.length)];
      });

      // شاشة البداية / الهوم (Android-style)
      if (mode === 'menu') {
        const coins = profile?.coins ?? 0;
        const challengeCost = 200;
        const canAffordOnline = coins >= challengeCost;

        return (

                {profile?.avatar_url ? (
                  <img src={profile.avatar_url} alt="" className="avatar-sm" />

                    {(profile?.display_name || user?.email || '?')[0].toUpperCase()}

                )}
              </div>

              <div className="font-display text-yellow-400 text-base tracking-widest">⚜ DUELIST'S ⚜</div>

              <div className="flex items-center gap-1">
                <div className="coin-badge">
                  <span className="coin-icon">¢</span>
                  <span>{coins.toLocaleString('en-US')}</span>
                </div>
                <button
                  onClick={(e) => { e.stopPropagation(); setShowRecharge(true); }}
                  style={{
                    width: '26px', height: '26px', borderRadius: '50%',
                    background: 'linear-gradient(135deg,#c9a961,#8a7544)',
                    border: 'none', color: '#1a1a1a', fontSize: '1.1rem',
                    fontWeight: '900', cursor: 'pointer', display: 'flex',
                    alignItems: 'center', justifyContent: 'center',
                    boxShadow: '0 0 8px rgba(201,169,97,0.5)'
                  }}
                  title="شحن العملات"
                >+</button>
              </div>

              {/* Profile dropdown */}
              {showProfileMenu && (
                <div className="profile-menu" onClick={(e) => e.stopPropagation()}>
                  <div className="profile-menu-header">
                    <div className="flex items-center gap-2">
                      {profile?.avatar_url && <img src={profile.avatar_url} alt="" className="w-10 h-10 rounded-full border border-yellow-700" />}
                      <div>
                        <div className="font-display text-sm text-yellow-300">{profile?.display_name || 'لاعب'}</div>
                        <div className="text-xs text-gray-500 truncate" style={{ maxWidth: '160px' }}>{user.email}</div>
                      </div>
                    </div>
                  </div>
                  {/* Player ID مع زرار نسخ */}
                  {profile?.player_id && (
                    <div
                      className="profile-menu-item"

                        navigator.clipboard?.writeText(profile.player_id);
                        const el = document.getElementById('pid-copy-msg');

                      }}
                      style={{ cursor: 'pointer' }}
                      title="اضغط للنسخ"
                    >
                      <span>🆔</span>
                      <span style={{ flex: 1 }}>
                        <span style={{ color: '#8a8275', fontSize: '0.75rem' }}>معرّفك: </span>
                        <b className="font-mono text-yellow-300" style={{ letterSpacing: '0.05em' }}>{profile.player_id}</b>
                      </span>
                      <span id="pid-copy-msg" style={{ fontSize: '0.7rem', color: '#5ec88f', opacity: 0, transition: 'opacity 0.2s' }}>✓ تم</span>
                    </div>
                  )}
                  <div className="profile-menu-item">
                    <span>🏆</span>
                    <span>التقييم: <b className="text-yellow-300">{profile?.rating ?? 1000}</b></span>
                  </div>
                  <div className="profile-menu-item">
                    <span>⚔</span>
                    <span>المباريات: <b className="text-yellow-300">{profile?.games_won ?? 0}</b> / {profile?.games_played ?? 0}</span>
                  </div>
                  {profile?.is_admin && (
                    <a href="admin.html" className="profile-menu-item" style={{ textDecoration: 'none' }}>
                      <span>⚙</span><span>لوحة التحكم</span>
                    </a>
                  )}
                  {profile?.is_admin && (
                    <div className="profile-menu-item" onClick={() => { setShowAdminCoins(true); setShowProfileMenu(false); }}>
                      <span>💰</span><span>شحن لاعب</span>
                    </div>

                  <div className="profile-menu-item" onClick={() => setShowRules(true)}>
                    <span>📜</span><span>قواعد اللعبة</span>
                  </div>
                  <div className="profile-menu-item danger" onClick={onSignOut}>
                    <span>⎋</span><span>تسجيل خروج</span>
                  </div>
                </div>
              )}
            </div>

            {/* محتوى الهوم */}
            <div className="px-4 pt-4">
              {/* ترحيب */}
              <div className="text-center mb-4">
                <div className="font-display text-2xl text-yellow-300 mb-1">
                  أهلاً، {(profile?.display_name || 'بطل').split(' ')[0]}
                </div>
                <div className="font-body text-sm text-gray-500">جاهز للمبارزة؟</div>
              </div>

              {/* إحصائيات */}
              <div className="stats-grid">
                <div className="stat-tile">
                  <div className="stat-value">{profile?.rating ?? 1000}</div>
                  <div className="stat-label">التقييم</div>
                </div>
                <div className="stat-tile">
                  <div className="stat-value">{profile?.games_won ?? 0}</div>
                  <div className="stat-label">انتصارات</div>
                </div>
                <div className="stat-tile">
                  <div className="stat-value">{profile?.games_played ?? 0}</div>
                  <div className="stat-label">مباريات</div>
                </div>
              </div>

              {/* أوضاع اللعب */}
              <div className="section-heading">⚜ ابدأ مبارزة</div>

              {/* أونلاين (مميز) */}
              <div
                className={`play-card featured ${!canAffordOnline ? 'disabled' : ''}`}
                onClick={() => {
                  if (!canAffordOnline) return;
                  setMatchmaking('searching');
                  setMatchTimer(30);
                }}
                title={!canAffordOnline ? 'محتاج 200 عملة على الأقل' : ''}
              >
                <div className="play-card-icon">🌐</div>
                <div className="flex-1">
                  <div className="play-card-title">تحدّي أونلاين</div>
                  <div className="play-card-desc">العب ضد لاعب حقيقي</div>
                </div>
                <div className="play-card-cost">
                  <span className="coin-icon" style={{ width: '16px', height: '16px', fontSize: '0.55rem' }}>¢</span>
                  <span>200</span>
                </div>
              </div>

              {/* لاعب واحد */}
              <div className="play-card" onClick={() => setMode('1p')}>
                <div className="play-card-icon">🤖</div>
                <div className="flex-1">
                  <div className="play-card-title">تدريب — لاعب واحد</div>
                  <div className="play-card-desc">العب ضد الكمبيوتر</div>
                </div>
                <div className="play-card-cost" style={{ borderColor: 'rgba(94,200,143,0.4)', color: '#5ec88f' }}>مجاناً</div>
              </div>

              {/* لاعبان */}
              <div className="play-card" onClick={() => setMode('2p')}>
                <div className="play-card-icon">👥</div>
                <div className="flex-1">
                  <div className="play-card-title">صديق — لاعبان</div>
                  <div className="play-card-desc">شاركوا نفس الجهاز</div>
                </div>
                <div className="play-card-cost" style={{ borderColor: 'rgba(94,200,143,0.4)', color: '#5ec88f' }}>مجاناً</div>
              </div>

              {!canAffordOnline && (
                <div className="mt-4 p-3 rounded bg-red-950/20 border border-red-900/40 text-center">
                  <div className="text-sm text-red-300 font-body">
                    رصيدك أقل من 200 عملة.{' '}
                    <span className="text-yellow-400 underline cursor-pointer" onClick={() => setShowRecharge(true)}>اشحن الآن</span>
                  </div>
                </div>
              )}

              {/* تذييل صغير + روابط قانونية */}
              <div className="text-center mt-8 text-xs text-gray-600 font-display">
                ⚜ DUELIST'S GAMBIT ⚜
              </div>
              <div className="text-center mt-2 mb-4 text-xs">
                <a href="/privacy.html" style={{ color: '#8a8275', textDecoration: 'underline' }}>
                  سياسة الخصوصية
                </a>
                <span style={{ color: '#5a4a2a', margin: '0 0.6rem' }}>•</span>
                <a href="/privacy.html" style={{ color: '#8a8275', textDecoration: 'underline' }}>
                  Privacy Policy
                </a>
              </div>
            </div>

            {/* ══ مودال شحن لاعب (للأدمن) ══ */}
            {showAdminCoins && (
              <AdminAddCoinsModal onClose={() => setShowAdminCoins(false)} />
            )}

            {/* ══ مودال شحن العملات ══ */}
            {showRecharge && (
              <div className="modal-backdrop" onClick={() => setShowRecharge(false)}>
                <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '360px' }}>
                  <h2 className="font-display text-xl text-yellow-400 mb-1 text-center">⚜ شحن العملات ⚜</h2>
                  <p className="text-center text-gray-500 text-sm font-body mb-4">اختر الباقة المناسبة</p>

                  {/* الباقات */}
                  {[
                    { coins: 2500, price: 300 },
                    { coins: 5000, price: 550 },
                    { coins: 7500, price: 800 },
                  ].map(pkg => (
                    <RechargePackage key={pkg.coins} pkg={pkg} />
                  ))}

                  <button className="btn w-full mt-4" style={{ width: '100%' }} onClick={() => setShowRecharge(false)}>إغلاق</button>
                </div>
              </div>
            )}

            {/* ══ مودال البحث عن لاعب ══ */}
            {matchmaking && (
              <MatchmakingModal
                matchmaking={matchmaking}
                matchTimer={matchTimer}
                setMatchTimer={setMatchTimer}
                setMatchmaking={setMatchmaking}
                setMode={setMode}
                onMatched={(info) => {
                  dispatch({ type: 'NEW_GAME' }); // ريسيت الحالة المحلية
                  setOnlineGame(info);
                  setMode('online');
                }}
                botName={botName}
                user={user}
              />
            )}

            {/* مودال القواعد */}
            {showRules && (
              <div className="modal-backdrop" onClick={() => setShowRules(false)}>
                <div className="modal" onClick={e => e.stopPropagation()}>
                  <h2 className="font-display text-2xl text-yellow-400 mb-4">⚜ قواعد اللعبة ⚜</h2>
                  <div className="font-body text-base space-y-3 text-gray-200 text-right">
                    <p><b className="text-yellow-300">الهدف:</b> اقتل ملك الخصم (HP = 0).</p>
                    <p><b className="text-yellow-300">المانا:</b> تبدأ بـ 1 وتزيد 1 كل دور حتى 10.</p>
                    <p><b className="text-yellow-300">الاستدعاء:</b> الوحوش توضع في الصف الخلفي فقط.</p>
                    <p><b className="text-yellow-300">الحركة:</b> اضغط وحشك ثم خانة مضاءة.</p>
                    <p><b className="text-yellow-300">القتال:</b> طرفا الصدام يأخذان ضرراً بقوة الآخر.</p>
                    <p><b className="text-yellow-300">السحر:</b> يُلعب مرة واحدة بأثر فوري.</p>
                    <p><b className="text-yellow-300">الفخاخ:</b> توضع مقلوبة في نصفك وتنطلق عند دخول العدو.</p>
                  </div>
                  <button className="btn mt-6" onClick={() => setShowRules(false)}>إغلاق</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // شاشة تحميل اللعبة الأونلاين
      if (mode === 'online' && onlineLoading) {
        return (
          <div className="modal-backdrop">
            <div className="modal text-center" style={{ maxWidth: '320px' }}>
              <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>⚔️</div>
              <h2 className="font-display text-xl text-yellow-400 mb-2">جاري تحميل المبارزة...</h2>
              <div style={{
                width: '60px', height: '60px', borderRadius: '50%', margin: '0.5rem auto',
                border: '4px solid rgba(201,169,97,0.2)', borderTopColor: '#c9a961',
                animation: 'spin 1s linear infinite'
              }} />
              <p className="font-body text-sm text-gray-400 mt-3">
                خصمك: <b className="text-yellow-300">{onlineGame?.opponentName}</b>
              </p>
              <p className="font-body text-xs text-gray-500 mt-1">
                أنت اللاعب {onlineGame?.myPlayerNum}
              </p>
            </div>
          </div>
        );
      }

      // الفائز
      if (state.winner) {
        const winnerText = (() => {
          if (mode === '1p' && state.winner === 2) return '💻 الكمبيوتر انتصر!';
          if (mode === 'online') {
            return state.winner === onlineGame?.myPlayerNum
              ? '🏆 انتصرت!'
              : `😔 ${onlineGame?.opponentName} انتصر`;
          }
          return `اللاعب ${state.winner} انتصر!`;
        })();
        return (
          <div className="modal-backdrop">
            <div className="modal text-center">
              <div className="font-display text-4xl text-yellow-400 mb-4">⚜ النصر ⚜</div>
              <div className="font-display text-2xl mb-6" style={{ color: state.winner === 1 ? '#d4a04a' : '#a0b8ff' }}>
                {winnerText}
              </div>
              <div className="ornament-line mb-6"><span>⚔</span></div>
              <p className="font-body text-lg mb-6 text-gray-300">
                {mode === 'online' && state.winner === onlineGame?.myPlayerNum
                  ? 'سقط ملك خصمك. تشرّفت المملكة بهذا النصر العظيم.'
                  : mode === 'online'
                    ? 'سقط ملكك. مرة جاية باذن الله.'
                    : 'سقط ملك الخصم. تشرّفت المملكة بهذا النصر العظيم.'}
              </p>
              <div className="flex gap-3 justify-center flex-wrap">
                {mode !== 'online' && (
                  <button className="btn" onClick={() => dispatch({ type: 'NEW_GAME' })}>
                    مبارزة جديدة
                  </button>
                )}
                <button className="btn btn-crimson" onClick={() => {
                  dispatch({ type: 'NEW_GAME' });
                  setOnlineGame(null);
                  setMode('menu');
                }}>
                  ⟲ القائمة الرئيسية
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          {/* لافتة الدور */}
          {showBanner && <div className="phase-banner">{showBanner}</div>}

          {/* شاشة "سلّم الجهاز" / "دورك" */}
          {showPassScreen && (
            <div className="modal-backdrop">
              <div className="modal text-center">
                <div className="font-display text-3xl text-yellow-400 mb-4">📜</div>
                <div className="font-display text-2xl mb-4" style={{ color: state.currentPlayer === 1 ? '#d4a04a' : '#a0b8ff' }}>
                  {mode === '1p' && state.currentPlayer === 1 ? '🎮 دورك الآن' : `دور اللاعب ${state.currentPlayer}`}
                </div>
                <p className="font-body text-lg mb-6 text-gray-300">
                  {mode === '1p' && state.currentPlayer === 1
                    ? 'اضغط الزر عندما تكون مستعداً.'
                    : `سلّم الجهاز للاعب ${state.currentPlayer}. عندما يكون مستعداً، اضغط الزر.`}
                </p>
                <button className="btn" onClick={() => setShowPassScreen(false)}>
                  {mode === '1p' && state.currentPlayer === 1 ? 'أبدأ ⚔' : 'أنا مستعد ⚔'}
                </button>
              </div>
            </div>
          )}

          {/* شاشة القواعد */}
          {showRules && (
            <div className="modal-backdrop" onClick={() => setShowRules(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <h2 className="font-display text-2xl text-yellow-400 mb-4">⚜ قواعد اللعبة ⚜</h2>
                <div className="font-body text-base space-y-3 text-gray-200">
                  <p><b className="text-yellow-300">الهدف:</b> اقتل ملك الخصم (HP = 0).</p>
                  <p><b className="text-yellow-300">المانا:</b> تبدأ بـ 1 وتزيد 1 كل دور حتى 10. تُستهلك في لعب الكروت.</p>
                  <p><b className="text-yellow-300">الاستدعاء:</b> ضع وحوشك في صفك الخلفي فقط (الصف 1 للاعب 1، الصف 8 للاعب 2).</p>
                  <p><b className="text-yellow-300">مرض الاستدعاء:</b> الوحش المستدعى للتو لا يقدر على التحرك في نفس الدور.</p>
                  <p><b className="text-yellow-300">الحركة:</b> اضغط وحشك ثم اضغط خانة مضاءة. كل وحش يتحرك مرة واحدة في الدور.</p>
                  <p><b className="text-yellow-300">القتال:</b> الدخول على وحش عدو = صدام. كلاهما يأخذ ضرراً بمقدار قوة الآخر. لو نجا المهاجم وحده، يحتل الخانة.</p>
                  <p><b className="text-yellow-300">الفخاخ:</b> توضع مقلوبة في نصفك. تنطلق تلقائياً عند دخول وحش العدو.</p>
                  <p><b className="text-yellow-300">السحر:</b> يُلعَب مرة واحدة بأثر فوري ثم يدخل المقبرة.</p>
                  <p><b className="text-yellow-300">السحب:</b> تسحب كرتاً واحداً في بداية كل دور (الحد الأقصى لليد: 8).</p>
                </div>
                <button className="btn mt-6" onClick={() => setShowRules(false)}>إغلاق</button>
              </div>
            </div>
          )}

          {/* الهيدر */}
          <header className="px-6 py-3 border-b border-yellow-900/40 bg-black/40">
            <div className="flex items-center justify-between gap-4 flex-wrap">
              <h1 className="font-display text-2xl text-yellow-400 tracking-wider">
                ⚜ Duelist's Gambit ⚜
              </h1>
              <div className="flex items-center gap-2">
                <span className="font-display text-xs text-gray-400">دور {state.turn}</span>
                {isOnlineMode && (
                  <span className="font-display text-xs text-blue-300" style={{ padding: '0.2rem 0.5rem', border: '1px solid #2a3a8a', borderRadius: '3px' }}>
                    🌐 أونلاين
                  </span>
                )}
                <div className="coin-badge" style={{ padding: '0.25rem 0.6rem', fontSize: '0.75rem' }}>
                  <span className="coin-icon" style={{ width: '16px', height: '16px', fontSize: '0.55rem' }}>¢</span>
                  <span>{(profile?.coins ?? 0).toLocaleString('en-US')}</span>
                </div>
                <button className="btn" style={{ padding: '0.3rem 0.7rem', fontSize: '0.7rem' }} onClick={() => setShowRules(true)}>
                  📜
                </button>
                <button className="btn" style={{ padding: '0.3rem 0.7rem', fontSize: '0.7rem' }} onClick={() => {
                  if (isOnlineMode) {
                    if (!confirm('لو خرجت دلوقتي هتخسر المبارزة. متأكد؟')) return;
                    // surrender: حدّث الـ DB والخصم يكسب
                    if (onlineGame) {
                      sb.from('games').update({
                        status: 'abandoned',
                        winner_id: onlineGame.myPlayerNum === 1 ? onlineGame.player2_id : onlineGame.player1_id,
                        updated_at: new Date().toISOString(),
                      }).eq('id', onlineGame.gameId).then(() => {});
                    }
                    setOnlineGame(null);
                  }
                  dispatch({ type: 'NEW_GAME' }); setMode('menu');
                }}>
                  ☰
                </button>
                {!isOnlineMode && (
                  <button className="btn btn-crimson" style={{ padding: '0.3rem 0.7rem', fontSize: '0.7rem' }} onClick={() => {
                    if (confirm('هل أنت متأكد من إنهاء المبارزة وبدء جديدة؟')) dispatch({ type: 'NEW_GAME' });
                  }}>
                  ⟲
                </button>
                )}
              </div>
            </div>
          </header>

          {/* الجسم الرئيسي */}
          <main className="flex-1 flex flex-col lg:flex-row gap-4 p-4">

            {/* العمود الأيمن: معلومات الخصم + الرقعة + معلومات اللاعب */}
            <div className="flex-1 flex flex-col gap-3 items-center">
              {/* بانل الخصم */}
              <div className="w-full max-w-3xl">
                <PlayerPanel
                  playerNum={otherPlayerNum}
                  player={state.players[otherPlayerNum]}
                  isCurrent={state.currentPlayer === otherPlayerNum}
                  viewMode="hidden"
                  kingHp={otherPlayerNum === 1 ? (king1?.hp ?? 0) : (king2?.hp ?? 0)}
                  kingMaxHp={KING_TEMPLATE.maxHp}
                  customName={isOnlineMode ? onlineGame.opponentName : null}
                />
                {/* كروت الخصم — مقلوبة دايماً */}
                <div className="flex gap-1 justify-center mt-2 flex-wrap overflow-x-auto py-1">
                  {state.players[otherPlayerNum].hand.map((cardId, i) =>
                    CARD_BACK_IMAGE ? (
                      <div key={i} style={{ width: '40px', height: '58px', borderRadius: '4px', overflow: 'hidden', border: '1.5px solid var(--gold-dim)', boxShadow: '0 3px 8px rgba(0,0,0,0.5)' }}>
                        <img src={CARD_BACK_IMAGE} alt="card back" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                      </div>
                    ) : (
                      <div key={i} className="card-back" style={{ width: '40px', minHeight: '58px', fontSize: '0.9rem' }}>⚜</div>
                    )
                  )}
                </div>
              </div>

              {/* الرقعة */}
              <div className="relative" style={{ maxWidth: 'min(85vh, 100%)' }}>
                <div className={`grid grid-cols-8 gap-0 border-4 border-yellow-700 bg-black ${BOARD_IMAGE ? 'board-with-image' : ''}`}
                     style={{
                       width: 'min(85vh, 95vw)',
                       aspectRatio: '1',
                       boxShadow: '0 0 40px rgba(201,169,97,0.2)',
                       backgroundImage: BOARD_IMAGE ? `url(${BOARD_IMAGE})` : undefined,
                       backgroundSize: 'cover',
                       backgroundPosition: 'center',
                     }}>
                  {/* نقلب الرقعة عشان اللاعب الحالي دايماً يشوف صفه الخلفي تحت */}
                  {Array.from({ length: BOARD_SIZE }).map((_, displayRow) => {
                    let flip;
                    if (mode === '2p') flip = state.currentPlayer === 2;
                    else if (mode === 'online') flip = onlineGame?.myPlayerNum === 2;
                    else flip = false;
                    const actualR = flip ? displayRow : BOARD_SIZE - 1 - displayRow;
                    const isTopRow = displayRow === 0;
                    // اللاعب المشاهد: في 1p = اللاعب 1 دايماً، في 2p = اللاعب الحالي، في online = myPlayerNum
                    const viewerPlayer = mode === '1p' ? 1 : mode === 'online' ? (onlineGame?.myPlayerNum ?? 1) : state.currentPlayer;
                    return Array.from({ length: BOARD_SIZE }).map((_, c) => {
                      const cell = state.board[actualR][c];
                      const hl = highlights[`${actualR},${c}`];
                      const isLight = (actualR + c) % 2 === 0;
                      return (
                        <BoardCell
                          key={`${actualR}-${c}`}
                          r={actualR}
                          c={c}
                          cell={cell}
                          highlight={hl}
                          isLight={isLight}
                          isTopRow={isTopRow}
                          currentPlayer={state.currentPlayer}
                          viewerPlayer={viewerPlayer}
                          onClick={(r, c) => {
                            if (mode === '1p' && state.currentPlayer === 2) return;
                            if (mode === 'online' && state.currentPlayer !== onlineGame?.myPlayerNum) return;
                            syncedDispatch({ type: 'CLICK_CELL', r, c });
                          }}
                          onFlip={(r, c) => {
                            if (mode === '1p' && state.currentPlayer === 2) return;
                            if (mode === 'online' && state.currentPlayer !== onlineGame?.myPlayerNum) return;
                            syncedDispatch({ type: 'FLIP_UNIT', r, c });
                          }}
                        />
                      );
                    });
                  })}
                </div>
              </div>

              {/* بانل اللاعب الأسفل (دايماً أنا في الأونلاين) */}
              <div className="w-full max-w-3xl">
                <PlayerPanel
                  playerNum={bottomPlayerNum}
                  player={currentPlayerData}
                  isCurrent={state.currentPlayer === bottomPlayerNum}
                  viewMode="full"
                  kingHp={bottomPlayerNum === 1 ? (king1?.hp ?? 0) : (king2?.hp ?? 0)}
                  kingMaxHp={KING_TEMPLATE.maxHp}
                  customName={isOnlineMode ? (profile?.display_name || onlineGame.myName) : null}
                />
              </div>

              {/* يد اللاعب الأسفل */}
              <div className="w-full">
                {/* بانر "دور خصمك" في الأونلاين */}
                {isOnlineMode && !isMyTurn && (
                  <div className="text-center mb-2">
                    <div className="inline-block px-4 py-2 bg-blue-900/30 border border-blue-700 rounded font-display text-sm text-blue-300 animate-pulse">
                      ⏳ في انتظار حركة {onlineGame.opponentName}...
                    </div>
                  </div>
                )}
                {state.pendingPlay && (
                  <div className="flex justify-center mb-2">
                    <div className="px-3 py-1 bg-yellow-900/40 border border-yellow-700 rounded font-display text-sm text-yellow-300">
                      {state.pendingPlay.mode === 'summon' && '👉 اختر خانة في صفك الخلفي لاستدعاء الوحش'}
                      {state.pendingPlay.mode === 'trap' && '👉 اختر خانة فاضية في نصفك لوضع الفخ'}
                      {state.pendingPlay.mode === 'spell' && state.pendingPlay.spellTarget === 'any_unit' && '👉 اختر وحشاً لتوجيه السحر إليه'}
                      {state.pendingPlay.mode === 'spell' && state.pendingPlay.spellTarget === 'own_unit' && '👉 اختر أحد وحوشك'}
                      {state.pendingPlay.mode === 'spell' && state.pendingPlay.spellTarget === 'own_unit_then_empty' && state.pendingPlay.step === 1 && '👉 اختر الوحش الذي تريد نقله'}
                      {state.pendingPlay.mode === 'spell' && state.pendingPlay.spellTarget === 'own_unit_then_empty' && state.pendingPlay.step === 2 && '👉 اختر الخانة الفارغة في نصفك'}
                      <button className="mr-3 underline" onClick={() => syncedDispatch({ type: 'CANCEL_PLAY' })}>إلغاء</button>
                    </div>
                  </div>
                )}
                <div className="flex gap-2 overflow-x-auto py-3 px-2 justify-center flex-wrap" style={{ opacity: isMyTurn ? 1 : 0.5 }}>
                  {currentPlayerData.hand.map((cardId, idx) => {
                    const card = CARD_BY_ID[cardId];
                    const affordable = currentPlayerData.mana >= card.cost;
                    const selected = state.pendingPlay && state.pendingPlay.cardId === cardId;
                    const isFlippedUp = flippedCardIdx === idx;

                    // الكارت مقلوب على وشه → اعرض الكارت كامل + click يلعبها
                    if (isFlippedUp) {
                      return (
                        <div key={`${cardId}-${idx}`} style={{ position: 'relative' }}>
                          <CardView
                            card={card}
                            selected={selected}
                            affordable={affordable && isMyTurn}
                            onClick={() => {
                              if (!affordable) return;
                              if (mode === '1p' && state.currentPlayer === 2) return;
                              if (!isMyTurn) return;
                              syncedDispatch({ type: 'SELECT_CARD', cardId });
                              setFlippedCardIdx(null);
                            }}
                          />
                          {/* زرار "ارجع على ضهره" */}
                          <button
                            onClick={(e) => { e.stopPropagation(); setFlippedCardIdx(null); }}
                            style={{
                              position: 'absolute',
                              top: '-8px',
                              right: '-8px',
                              width: '22px', height: '22px',
                              borderRadius: '50%',
                              background: '#3a2d1f',
                              border: '1px solid #c9a961',
                              color: '#c9a961',
                              fontSize: '0.8rem',
                              cursor: 'pointer',
                              display: 'flex', alignItems: 'center', justifyContent: 'center',
                              zIndex: 5,
                            }}
                            title="اقلب على ضهره"
                          >↻</button>
                        </div>
                      );
                    }

                    // الكارت على ضهره → اعرض الـ card back
                    return (
                      <div
                        key={`${cardId}-${idx}`}
                        onClick={() => {
                          if (mode === '1p' && state.currentPlayer === 2) return;
                          if (!isMyTurn) return;
                          setFlippedCardIdx(idx);
                        }}
                        style={{
                          width: '88px', height: '128px',
                          borderRadius: '6px',
                          overflow: 'hidden',
                          border: '2px solid var(--gold-dim)',
                          boxShadow: '0 4px 10px rgba(0,0,0,0.6)',
                          cursor: isMyTurn ? 'pointer' : 'not-allowed',
                          flexShrink: 0,
                          transition: 'transform 0.15s ease',
                        }}
                        onMouseEnter={e => { if (isMyTurn) e.currentTarget.style.transform = 'translateY(-4px)'; }}
                        onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; }}
                        title="اضغط لقلب الكارت"
                      >
                        {CARD_BACK_IMAGE ? (
                          <img src={CARD_BACK_IMAGE} alt="card back" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                        ) : (
                          <div className="card-back" style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.5rem' }}>⚜</div>
                        )}
                      </div>
                    );
                  })}
                </div>
                {(mode !== '1p' || state.currentPlayer !== 2) && isMyTurn && (
                  <div className="flex justify-center mt-2">
                    <button className="btn" onClick={() => syncedDispatch({ type: 'END_TURN' })}>
                      ⌛ إنهاء الدور
                    </button>
                  </div>
                )}
                {mode === '1p' && state.currentPlayer === 2 && (
                  <div className="text-center text-yellow-500 font-display text-sm mt-2 animate-pulse">
                    💻 الكمبيوتر يلعب دوره...
                  </div>
                )}
              </div>
            </div>

            {/* العمود الأيسر: سجل الأحداث */}
            <aside className="lg:w-80 w-full bg-black/40 border border-yellow-900/40 rounded p-3 flex flex-col" style={{ maxHeight: 'calc(100vh - 7rem)' }}>
              <h3 className="font-display text-lg text-yellow-400 mb-2 text-center">📜 سجل المبارزة</h3>
              <div className="ornament-line mb-2"><span>⚔</span></div>
              <div ref={logRef} className="flex-1 overflow-y-auto pr-2" style={{ minHeight: '200px' }}>
                {state.log.map((entry, i) => (
                  <div key={i} className={`log-entry ${entry.type}`}>{entry.msg}</div>
                ))}
              </div>
            </aside>
          </main>

          <footer className="text-center py-2 text-xs text-gray-600 font-display border-t border-yellow-900/20">
            ⚜ Duelist's Gambit ⚜
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
